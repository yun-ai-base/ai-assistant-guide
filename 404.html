<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>页面未找到 · AI 使用智能助理</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .nf-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 40px 20px; }
    .nf-code { font-size: 80px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
    .nf-title { font-size: 22px; margin: 16px 0 8px; color: var(--text); }
    .nf-desc { color: var(--text-dim); margin-bottom: 28px; }
    .nf-btn { display: inline-block; padding: 12px 28px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #06121f; font-weight: 700; font-size: 15px; text-decoration: none; transition: .2s; }
    .nf-btn:hover { opacity: .85; transform: scale(1.03); }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <div class="nf-code">404</div>
    <div class="nf-title">页面未找到</div>
    <div class="nf-desc">你访问的页面不存在，可能链接已变更或输入有误。</div>
    <a class="nf-btn" href="/ai-assistant-guide/">← 回到首页</a>
  </div>
</body>
</html>
